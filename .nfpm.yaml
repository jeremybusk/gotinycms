name: uvoominicms
arch: ${GOARCH}
platform: linux
version: ${VERSION}
section: web
priority: optional
maintainer: Uvoo <support@uvoo.io>
description: Small SQLite-backed CMS with a Go backend and React admin UI.
homepage: https://github.com/uvoo/uvoominicms
license: MIT
contents:
  - src: ./bin/uvoominicms
    dst: /usr/bin/uvoominicms
    file_info:
      mode: 0755
  - src: ./web/dist
    dst: /usr/share/uvoominicms/web/dist
    type: tree
  - src: ./packaging/uvoominicms.env
    dst: /etc/uvoominicms/uvoominicms.env
    type: config
    file_info:
      mode: 0640
  - src: ./packaging/uvoominicms.service
    dst: /usr/lib/systemd/system/uvoominicms.service
    file_info:
      mode: 0644
scripts:
  preinstall: ./packaging/scripts/preinstall.sh
  postinstall: ./packaging/scripts/postinstall.sh
  preremove: ./packaging/scripts/preremove.sh
  postremove: ./packaging/scripts/postremove.sh
