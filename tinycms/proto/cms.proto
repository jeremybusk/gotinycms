syntax = "proto3";

package cms.v1;

import "google/protobuf/struct.proto";

service CMSService {
  rpc Health(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc ListPages(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc GetPage(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc SavePage(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc DeletePage(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc UploadFile(google.protobuf.Struct) returns (google.protobuf.Struct);
}
